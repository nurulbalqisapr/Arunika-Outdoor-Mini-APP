<!doctype html>
<html>
<head>
  <title>Renter Menu - Arunika Outdoor</title>
  <style>
    /* BODY & BACKGROUND */
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      background:
        linear-gradient(rgba(255, 248, 240, 0.2), rgba(200, 170, 130, 0.2)),
        url("{{ url_for('static', filename='img/arunika.jpg') }}");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* HEADER */
    .header-title {
      position: absolute;
      top: 40px;
      width: 100%;
      text-align: center;
      z-index: 1;
    }

    .header-title h1 {
      font-size: 48px;
      margin: 0;
      color: #8B5E3C;
    }

    .header-title p {
      font-size: 20px;
      margin: 5px 0 0;
      color: #A67B5B;
      font-weight: 400;
      letter-spacing: 1px;
    }

    /* CARD TENGAH */
    .menu-container {
      width: 100%;
      max-width: 450px;
      background: rgba(255, 248, 240, 0.92);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.2);
      margin: auto;
    }

    h2 {
      color: #8B5E3C;
      margin-bottom: 20px;
    }

    hr {
      border: none;
      height: 1px;
      background: #A67B5B;
      margin: 15px 0 20px;
    }

    /* TOMBOL */
    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 20px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    /* tombol menu hijau */
    button:not(.btn-back):not(.btn-logout) {
      background: linear-gradient(135deg, #A3C293, #7DA77E);
    }

    button:not(.btn-back):not(.btn-logout):hover {
      transform: scale(1.03);
    }

    .btn-back:hover {
      transform: scale(1.03);
    }

    /* tombol logout coklat */
    .btn-logout {
      background: linear-gradient(135deg, #A0522D, #8B4513);
    }

    .btn-logout:hover {
      transform: scale(1.03);
    }

    /* responsive */
    @media (max-width: 600px) {
      .menu-container {
        max-width: 100%;
        padding: 25px;
      }
      .header-title h1 {
        font-size: 34px;
      }
      .header-title p {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header-title">
  <h1>🌿 ARUNIKA OUTDOOR 🏕️</h1>
  <p>Explore the peaks, gear up with us!</p>
</div>

<!-- CARD -->
<div class="menu-container">
  <h2>Renter Menu</h2>
  <hr>

  <form action="/user/equipment" method="get">
    <button type="submit">[1] View Equipment List</button>
  </form>
  <form action="/user/rental/create" method="get">
    <button type="submit">[2] Create Rental</button>
  </form>
  <form action="/user/rental/update" method="get">
    <button type="submit">[3] Update Rental</button>
  </form>
  <form action="/user/rental/cancel" method="get">
    <button type="submit">[4] Cancel Rental</button>
  </form>
  <form action="/user/rental/return" method="get">
    <button type="submit">[5] Return Equipment</button>
  </form>
  <form action="/user/invoice" method="get">
    <button type="submit">[6] View Invoice</button>
  </form>
  <form action="/user/profile" method="get">
    <button type="submit">[7] View Personal Data</button>
  </form>

  <form action="/logout" method="get">
    <button type="submit" class="btn-logout">Logout</button>
  </form>
</div>

</body>
</html>
