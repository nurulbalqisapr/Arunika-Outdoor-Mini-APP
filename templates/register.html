<!DOCTYPE html>
<html>
<head>
<title>Register - Arunika Outdoor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  /* 🔥 SAMA KAYA LOGIN */
  background:
    linear-gradient(rgba(255,240,220,0.2), rgba(200,170,130,0.3)),
    url("{{ url_for('static', filename='img/arunika.jpg') }}");
  background-size:cover;
  background-position:center;
}

/* 🔥 HEADER */
.header-title{
  position:absolute;
  top:40px;
  width:100%;
  text-align:center;
}

.header-title h2{
  margin:0;
  font-weight:400;
  letter-spacing:4px;
  font-size:22px;
  color:#A67B5B;
}

.header-title h1{
  margin:0;
  font-size:50px;
  letter-spacing:6px;
  color:#8B5E3C;
}

/* 🔥 CARD */
.container{
  background: rgba(255, 248, 240, 0.92);
  backdrop-filter: blur(6px);

  padding:30px;
  border-radius:16px;
  width:420px;
  max-height:80vh; /* 🔥 biar scroll di HP */
  overflow-y:auto;

  box-shadow:0 15px 40px rgba(0,0,0,0.2);
}

/* 🔥 TITLE */
h1{
  text-align:center;
  color:#8B5E3C;
  margin-bottom:20px;
}

/* 🔥 FORM */
label{
  font-weight:600;
  display:block;
  margin-top:10px;
  font-size:13px;
  color:#6b4f3b;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:13px;
}

/* ERROR */
.error-msg{
  color:#d32f2f;
  font-size:11px;
  margin-top:3px;
}

input.invalid, select.invalid{
  border-color:#d32f2f;
  background:#fff8f8;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:20px;
  background: linear-gradient(135deg, #A0522D, #8B4513);
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.03);
}

/* LINK */
.back{
  display:block;
  text-align:center;
  margin-top:15px;
  color:#6b4f3b;
  text-decoration:none;
  font-size:14px;
}

/* ERROR SERVER */
.server-error{
  background:#d32f2f;
  color:white;
  padding:10px;
  border-radius:8px;
  text-align:center;
  margin-bottom:15px;
}

/* 🔥 MOBILE */
@media (max-width:600px){

  .header-title h1{
    font-size:32px;
  }

  .header-title h2{
    font-size:14px;
  }

  .container{
    width:90%;
    padding:20px;
    max-height:75vh;
  }
}

</style>
</head>

<body>


<!-- 🔥 FORM -->
<div class="container">

<h1>Register</h1>

{% if error %}
<div class="server-error">❌ {{ error }}</div>
{% endif %}

<form id="regForm" method="post">

<!-- FORM KAMU (TIDAK DIUBAH) -->
<label>UserID</label>
<input id="userid" name="userid" type="text" value="{{ form_data.userid if form_data else '' }}" required>
<span id="error-userid" class="error-msg"></span>

<label>Password</label>
<input id="password" name="password" type="password" required>
<span id="error-password" class="error-msg"></span>

<label>Email</label>
<input id="email" name="email" type="email" value="{{ form_data.email if form_data else '' }}" required>
<span id="error-email" class="error-msg"></span>

<label>Role</label>
<select id="role" name="role">
<option value="admin">Admin</option>
<option value="renter">Renter</option>
</select>

<label>Name</label>
<input id="nama" name="nama" type="text" required>

<label>Gender</label>
<select id="gender" name="gender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Age</label>
<input id="usia" name="usia" type="number" required>

<label>Job</label>
<input id="pekerjaan" name="pekerjaan" type="text" required>

<label>Hobbies</label>
<input id="hobi" name="hobi" type="text" required>

<label>City</label>
<input id="kota" name="kota" type="text" required>

<label>RT</label>
<input id="rt" name="rt" type="number" required>

<label>RW</label>
<input id="rw" name="rw" type="number" required>

<label>Zip Code</label>
<input id="zipc" name="zipc" type="number" required>

<label>Latitude</label>
<input id="lat" name="lat" type="text" required>

<label>Longitude</label>
<input id="lon" name="lon" type="text" required>

<label>Phone Number</label>
<input id="nohp" name="nohp" type="number" required>

<button type="submit">Register</button>

</form>

<a class="back" href="{{ url_for('login_route') }}">Back to Login</a>

</div>

</body>
</html>
